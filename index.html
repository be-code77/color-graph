<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Mixer | be-code</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #efefef;
    --border: #e0ddd8;
    --text: #1a1a1a;
    --text-muted: #999;
    --accent: #a07840;
    --accent2: #b08050;
    --nail-base: #e8c4a8; /* 素の爪の色 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    padding: 32px 24px 20px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 0.15em;
    color: var(--accent);
  }
  header p {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ========== ネイルチップ ========== */
  .result-section {
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .nail-scene {
    position: relative;
    width: 100px;
    height: 130px;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
  }

  /* 爪の素地（下レイヤー） */
  .nail-base-layer {
    position: absolute;
    inset: 0;
    border-radius: 50px 50px 22px 22px;
    background: radial-gradient(ellipse at 38% 30%, #ffffff 0%, #f0f0f0 40%, #dcdcdc 100%);
  }

  /* ジェルカラーレイヤー（透過対応） */
  .nail-color-layer {
    position: absolute;
    inset: 0;
    border-radius: 50px 50px 22px 22px;
    transition: background 0.35s ease, opacity 0.35s ease;
  }

  /* 立体感: 側面の暗い影 */
  .nail-shadow-layer {
    position: absolute;
    inset: 0;
    border-radius: 50px 50px 22px 22px;
    background:
      radial-gradient(ellipse at 0% 50%, rgba(0,0,0,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 50%, rgba(0,0,0,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.12) 0%, transparent 45%);
  }

  /* 立体感: 表面の曲面ハイライト */
  .nail-highlight-layer {
    position: absolute;
    inset: 0;
    border-radius: 50px 50px 22px 22px;
    background:
      radial-gradient(ellipse at 38% 22%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.1) 35%, transparent 60%),
      linear-gradient(170deg, rgba(255,255,255,0.08) 0%, transparent 50%);
  }

  /* 表面の艶: トップコート感 */
  .nail-gloss-layer {
    position: absolute;
    top: 8px;
    left: 14px;
    width: 28px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(160deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.05) 100%);
    filter: blur(5px);
    transform: rotate(-12deg);
  }

  /* 輪郭線 */
  .nail-border-layer {
    position: absolute;
    inset: 0;
    border-radius: 50px 50px 22px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }

  .color-info {
    text-align: center;
  }
  .hex-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 0.1em;
  }
  .rgb-value {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .opacity-value {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* ========== 共通 ========== */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 24px 20px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 24px;
    margin-bottom: 14px;
  }

  /* ========== パレット ========== */
  .palette-section { padding: 0 16px; margin-bottom: 8px; }

  .palette-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .palette-chip-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 22px;
  }

  .palette-chip {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    position: relative;
  }
  .palette-chip::after {
    content: '';
    position: absolute;
    top: 3px; left: 4px;
    width: 40%;
    height: 35%;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    filter: blur(2px);
  }
  .palette-chip:active { transform: scale(0.93); }
  .palette-chip.selected {
    border-color: var(--accent);
    transform: scale(1.1);
  }
  .chip-label {
    font-size: 9px;
    white-space: nowrap;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 5px;
  }

  /* ========== ミキシング ========== */
  .mixing-section { padding: 0 24px; }

  .mix-item {
    margin-bottom: 18px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mix-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .mix-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .mix-name { font-size: 12px; letter-spacing: 0.08em; flex: 1; }
  .mix-percent {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent);
    min-width: 44px;
    text-align: right;
  }
  .mix-remove {
    width: 20px; height: 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .mix-remove:active { background: #efefef; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 3px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  .empty-hint {
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 20px 0;
    line-height: 1.8;
  }
  .max-hint {
    font-size: 10px;
    color: var(--accent2);
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  footer {
    text-align: center;
    padding: 32px 24px 0;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <h1>Color Mixer</h1>
  <p>be-code gel nail simulation</p>
</header>

<div class="result-section">
  <div class="nail-scene">
    <div class="nail-base-layer"></div>
    <div class="nail-color-layer" id="nailColor"></div>
    <div class="nail-shadow-layer"></div>
    <div class="nail-highlight-layer"></div>
    <div class="nail-gloss-layer"></div>
    <div class="nail-border-layer"></div>
  </div>
  <div class="color-info">
    <div class="hex-value" id="hexValue">#F5F5F5</div>
    <div class="rgb-value" id="rgbValue">R 245 / G 245 / B 245</div>
    <div class="opacity-value" id="opacityValue">透明度 —</div>
</div>
</div>

<hr class="divider">

<div class="palette-section">
  <p class="section-title">カラーペーストを選ぶ（最大4色）</p>
  <div class="palette-grid" id="paletteGrid"></div>
</div>

<hr class="divider">

<div class="mixing-section">
  <p class="section-title">配合比率</p>
  <div id="mixingArea">
    <p class="empty-hint">上のパレットから<br>色を選んでください</p>
  </div>
</div>

<footer>© be-code</footer>

<script>
// ============================================================
// カラーデータ
// ============================================================
const COLORS = [
  { id: 'clear',       name: 'クリア',   rgb: [255, 255, 255], isClear: true  },
  { id: 'black',       name: '黒',       rgb: [20,  20,  20 ], isClear: false },
  { id: 'white',       name: '白',       rgb: [245, 245, 240], isClear: false },
  { id: 'red1',        name: '赤1',      rgb: [220, 30,  40 ], isClear: false },
  { id: 'red2',        name: '赤2',      rgb: [185, 20,  55 ], isClear: false },
  { id: 'blue',        name: '青',       rgb: [30,  80,  200], isClear: false },
  { id: 'yellow',      name: '黄',       rgb: [255, 220, 10 ], isClear: false },
  { id: 'ultramarine', name: '群青',     rgb: [20,  50,  160], isClear: false },
  { id: 'magenta',     name: 'マゼンダ', rgb: [220, 20,  130], isClear: false },
  { id: 'cyan',        name: 'シアン',   rgb: [0,   190, 210], isClear: false },
];

// ============================================================
// 状態
// ============================================================
let selected = [];


// ============================================================
// 混色計算
// ============================================================
function calcMix() {
  if (selected.length === 0) return { rgb: [245, 245, 245], opacity: 1.0 };

  const total = selected.reduce((s, x) => s + x.ratio, 0);
  if (total === 0) return { rgb: [245, 245, 245], opacity: 1.0 };

  // クリアの比率を計算（透過度に使用）
  const clearRatio = selected
    .filter(s => COLORS.find(c => c.id === s.id)?.isClear)
    .reduce((sum, s) => sum + s.ratio, 0) / total;

  // クリア以外の色を減法混色（CMY空間）
  const nonClear = selected.filter(s => !COLORS.find(c => c.id === s.id)?.isClear);
  const nonClearTotal = nonClear.reduce((s, x) => s + x.ratio, 0);

  let rgb;
  if (nonClearTotal === 0) {
    // クリアのみ → 白に近い
    rgb = [252, 252, 252];
  } else {
    let C = 0, M = 0, Y = 0;
    for (const s of nonClear) {
      const color = COLORS.find(c => c.id === s.id);
      const w = s.ratio / nonClearTotal;
      const [r, g, b] = color.rgb;
      C += w * (1 - r / 255);
      M += w * (1 - g / 255);
      Y += w * (1 - b / 255);
    }
    rgb = [
      Math.round((1 - C) * 255),
      Math.round((1 - M) * 255),
      Math.round((1 - Y) * 255),
    ];
  }

  // クリアが多いほど透明度が上がる（opacity: 0.05〜1.0）
  const opacity = Math.max(0.05, 1.0 - clearRatio * 0.95);

  return { rgb, opacity };
}

function toHex([r, g, b]) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0').toUpperCase()).join('');
}

// ============================================================
// 描画
// ============================================================
function renderPalette() {
  const grid = document.getElementById('paletteGrid');
  grid.innerHTML = '';
  for (const color of COLORS) {
    const wrapper = document.createElement('div');
    wrapper.className = 'palette-chip-wrapper';

    const chip = document.createElement('div');
    chip.className = 'palette-chip' + (selected.find(s => s.id === color.id) ? ' selected' : '');

    // クリアは特別なスタイル
    if (color.isClear) {
      chip.style.background = 'linear-gradient(135deg, #fff 0%, #e0e0e0 50%, #fff 100%)';
      chip.style.border = '2px solid #aaa';
    } else {
      chip.style.background = `rgb(${color.rgb.join(',')})`;
    }
    if (selected.find(s => s.id === color.id)) {
      chip.style.borderColor = 'var(--accent)';
    }

    chip.addEventListener('click', () => toggleColor(color.id));

    const label = document.createElement('span');
    label.className = 'chip-label';
    label.textContent = color.name;

    wrapper.appendChild(chip);
    wrapper.appendChild(label);
    grid.appendChild(wrapper);
  }
}

function renderMixing() {
  const area = document.getElementById('mixingArea');
  area.innerHTML = '';

  if (selected.length === 0) {
    area.innerHTML = '<p class="empty-hint">上のパレットから<br>色を選んでください</p>';
    return;
  }

  if (selected.length >= 4) {
    const hint = document.createElement('p');
    hint.className = 'max-hint';
    hint.textContent = '最大4色まで選択できます';
    area.appendChild(hint);
  }

  for (const s of selected) {
    const color = COLORS.find(c => c.id === s.id);
    const item = document.createElement('div');
    item.className = 'mix-item';

    const dotStyle = color.isClear
      ? 'background: linear-gradient(135deg, #fff 0%, #ccc 100%); border: 1px solid #999;'
      : `background: rgb(${color.rgb.join(',')});`;

    item.innerHTML = `
      <div class="mix-header">
        <div class="mix-dot" style="${dotStyle}"></div>
        <span class="mix-name">${color.name}</span>
        <span class="mix-percent" id="pct-${s.id}">${s.ratio}</span>
        <button class="mix-remove" data-id="${s.id}">×</button>
      </div>
      <input type="range" min="1" max="100" value="${s.ratio}" data-id="${s.id}">
    `;
    area.prepend(item);

    // スライダーの背景色設定
    const input = item.querySelector('input');
    updateSliderBg(input, color, s.ratio);
  }

  // イベント: スライダー
  area.querySelectorAll('input[type=range]').forEach(input => {
    input.addEventListener('input', e => {
      const id = e.target.dataset.id;
      const val = parseInt(e.target.value);
      const s = selected.find(x => x.id === id);
      const color = COLORS.find(c => c.id === id);
      if (s) s.ratio = val;
      document.getElementById('pct-' + id).textContent = val;
      updateSliderBg(e.target, color, val);
      updatePreview();
    });
  });

  // イベント: 削除
  area.querySelectorAll('.mix-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      selected = selected.filter(s => s.id !== id);
      renderAll();
    });
  });
}

function updateSliderBg(input, color, val) {
  const trackColor = color.isClear ? '#ccc' : `rgb(${color.rgb.join(',')})`;
  input.style.background = `linear-gradient(to right, ${trackColor} 0%, ${trackColor} ${val}%, #2e2e2e ${val}%, #2e2e2e 100%)`;
}

function updatePreview() {
  const { rgb, opacity } = calcMix();
  const hex = toHex(rgb);
  const pct = Math.round((1 - opacity) * 100);

  const colorLayer = document.getElementById('nailColor');
  colorLayer.style.background = `rgb(${rgb.join(',')})`;
  colorLayer.style.opacity = opacity;

  document.getElementById('hexValue').textContent = hex;
  document.getElementById('rgbValue').textContent = `R ${rgb[0]} / G ${rgb[1]} / B ${rgb[2]}`;
  document.getElementById('opacityValue').textContent =
    pct === 0 ? '透明度 — 不透明' : `透明度 ${pct}%`;
}

function renderAll() {
  renderPalette();
  renderMixing();
  updatePreview();
}

function toggleColor(id) {
  const idx = selected.findIndex(s => s.id === id);
  if (idx >= 0) {
    selected.splice(idx, 1);
  } else {
    if (selected.length >= 4) return;
    selected.push({ id, ratio: 50 });
  }
  renderAll();
}

renderAll();
</script>
</body>
</html>
